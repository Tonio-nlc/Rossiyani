    canonicalAnchors:
      - "Мне холодно."
      - "Идёт снег."

  - id: text-a1-friend-01
    titleFr: "On se voit demain ?"
    titleRu: "Увидимся завтра?"
    collection: dialogues
    wordCount: 80-100
    readingOrder: 11
    status: to_write
    curriculum:
      level: A1.3
      introduces:
        - lp.morphology.dative_recipient.v1
        - lp.verbs.imperative_forms.v1
      reinforces:
        - lp.syntax.zero_subject.v1
        - lp.lexique.questions_intonation.v1
        - lp.morphology.role_terminations.v1
    scenes:
      - Fixer un rendez-vous (дать, сказать, позвонить)
      - Invitations (давай, пойдём)
    canonicalAnchors:
      - "Давай встретимся завтра!"
      - "Я звоню другу."

  - id: text-a1-city-01
    titleFr: "Une promenade"
    titleRu: "Прогулка по городу"
    collection: travel-russian
    wordCount: 120-140
    readingOrder: 12
    status: to_write
    curriculum:
